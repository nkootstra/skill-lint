name: "Skill Eval"
description: "Evaluate and benchmark agent skills in pull requests with automated testing and suggestions."
author: "nkootstra"

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  provider:
    description: "LLM provider to use: anthropic, openai, litellm, or claude-code"
    required: false
    default: "anthropic"
  model:
    description: "Model name (e.g., claude-haiku-4-5-20250414, haiku, sonnet, opus, gpt-4o, or any LiteLLM model)"
    required: false
    default: ""
  anthropic_api_key:
    description: "Anthropic API key (required when provider is anthropic)"
    required: false
  openai_api_key:
    description: "OpenAI API key (required when provider is openai)"
    required: false
  litellm_api_key:
    description: "API key for LiteLLM provider"
    required: false
  litellm_api_base:
    description: "Base URL for LiteLLM-compatible API"
    required: false
  claude_code_oauth_token:
    description: "Claude Code OAuth token for Pro/Max subscription auth (generate with 'claude setup-token')"
    required: false
  claude_code_path:
    description: "Path to Claude Code CLI binary (for claude-code provider; auto-installed if not found)"
    required: false
    default: ""
  config_path:
    description: "Path to .skill-eval.yml config file"
    required: false
    default: ".skill-eval.yml"
  skills_path:
    description: "Path to skills directory (overrides config file)"
    required: false
  github_token:
    description: "GitHub token for PR comments and check status"
    required: false
    default: ${{ github.token }}
  parallel_evals:
    description: "Number of evals to run in parallel (1-10, lower for rate-limited APIs)"
    required: false
    default: "3"
  eval_preset:
    description: "Eval preset: smoke (3 trials), reliable (10 trials), or regression (25 trials). Overridden by explicit eval_trials."
    required: false
  eval_trials:
    description: "Number of trials per eval test case for pass@k/pass^k statistical metrics (1-50, default 1 for single-run)"
    required: false
    default: "1"
  min_pass_rate:
    description: "Minimum eval pass rate (0.0-1.0) to consider the run successful. Default 1.0 requires all evals to pass."
    required: false
  fail_on_error:
    description: "Fail the action if any evaluation errors are found"
    required: false
    default: "true"

outputs:
  results:
    description: "JSON string of evaluation results"
  passed:
    description: "Whether all evaluations passed"
  summary:
    description: "Human-readable summary of results"

runs:
  using: "node20"
  main: "dist/index.js"
